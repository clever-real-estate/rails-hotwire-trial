version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: clever_app
    ports:
      - "3000:3000"
      - "3035:3035"
    environment:
      - RAILS_ENV=development
      - RAILS_LOG_TO_STDOUT=true
      - BUNDLE_PATH=/bundle
    volumes:
      - .:/rails
      - bundle_cache:/bundle
      - node_modules:/rails/node_modules
    command: >
      bash -c "
        bundle install &&
        rails db:prepare &&
        bin/dev
      "
    stdin_open: true
    tty: true

volumes:
  bundle_cache:
  node_modules:
